<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58A6FF"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- produce (top center) -->
  <rect x="140" y="20" width="120" height="40" rx="8" fill="none" stroke="#58A6FF" stroke-width="2"/>
  <text x="200" y="46" text-anchor="middle" fill="#C9D1D9" font-size="16" font-weight="600">produce</text>

  <!-- verify (bottom right) -->
  <rect x="270" y="180" width="120" height="40" rx="8" fill="none" stroke="#58A6FF" stroke-width="2"/>
  <text x="330" y="206" text-anchor="middle" fill="#C9D1D9" font-size="16" font-weight="600">verify</text>

  <!-- accumulate (bottom left) -->
  <rect x="10" y="180" width="130" height="40" rx="8" fill="none" stroke="#58A6FF" stroke-width="2"/>
  <text x="75" y="206" text-anchor="middle" fill="#C9D1D9" font-size="16" font-weight="600">accumulate</text>

  <!-- Arrow: produce → verify -->
  <line x1="250" y1="58" x2="285" y2="178" stroke="#58A6FF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: verify → accumulate -->
  <line x1="270" y1="200" x2="142" y2="200" stroke="#58A6FF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: accumulate → produce -->
  <line x1="55" y1="180" x2="155" y2="62" stroke="#58A6FF" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
