<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400" width="480" height="400">
  <!-- Circular path -->
  <circle cx="240" cy="200" r="155" fill="none" stroke="#58A6FF" stroke-width="2.5"/>

  <!-- Clockwise direction arrows at midpoints between nodes -->
  <polygon points="-8,-5 8,0 -8,5"
           transform="translate(374,123) rotate(60)" fill="#58A6FF"/>
  <polygon points="-8,-5 8,0 -8,5"
           transform="translate(240,355) rotate(180)" fill="#58A6FF"/>
  <polygon points="-8,-5 8,0 -8,5"
           transform="translate(106,123) rotate(-60)" fill="#58A6FF"/>

  <!-- Node: produce (top center) -->
  <rect x="170" y="22" width="140" height="46" rx="10" fill="#0D1117" stroke="#58A6FF" stroke-width="2"/>
  <text x="240" y="52" text-anchor="middle" fill="#C9D1D9" font-size="18" font-weight="500"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif">produce</text>

  <!-- Node: verify (bottom right) -->
  <rect x="304" y="255" width="140" height="46" rx="10" fill="#0D1117" stroke="#58A6FF" stroke-width="2"/>
  <text x="374" y="285" text-anchor="middle" fill="#C9D1D9" font-size="18" font-weight="500"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif">verify</text>

  <!-- Node: accumulate (bottom left) -->
  <rect x="36" y="255" width="140" height="46" rx="10" fill="#0D1117" stroke="#58A6FF" stroke-width="2"/>
  <text x="106" y="285" text-anchor="middle" fill="#C9D1D9" font-size="18" font-weight="500"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif">accumulate</text>
</svg>
